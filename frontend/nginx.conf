# Ne pas divulguer la version de nginx dans les réponses/erreurs.
server_tokens off;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ---- En-têtes de sécurité (appliqués à toutes les réponses) ----
    # Empêche le navigateur de "deviner" un type MIME (anti-sniffing).
    add_header X-Content-Type-Options "nosniff" always;
    # Anti-clickjacking : la page ne peut pas être encadrée par un autre site.
    add_header X-Frame-Options "DENY" always;
    # Limite les informations de provenance envoyées aux autres origines.
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Coupe les APIs sensibles inutilisées par le SPA.
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # HSTS : force HTTPS pendant 1 an. N'a d'effet qu'une fois le TLS terminé en
    # amont (load balancer / proxy) ; inoffensif tant que le site est servi en HTTPS.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # CSP : politique de contenu. 'self' partout ; img en https (la pochette Cover Art
    # Archive redirige vers archive.org) ; styles inline autorisés (React/Tailwind) ;
    # l'API est same-origin (connect-src 'self'). Pas d'iframe, pas de base injectée.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

    # SPA : toute route inconnue retombe sur index.html (react-router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy vers le backend Spring Boot (même origine => pas de CORS)
    location /api/ {
        proxy_pass http://app:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
