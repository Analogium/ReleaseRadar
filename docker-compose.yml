services:
  postgres:
    image: postgres:17
    container_name: release-radar-db
    environment:
      POSTGRES_DB: release_radar
      POSTGRES_USER: release_radar
      POSTGRES_PASSWORD: release_radar
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U release_radar']
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: ./backend
    container_name: release-radar-app
    ports:
      - '8080:8080'
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/release_radar
      SPRING_DATASOURCE_USERNAME: release_radar
      SPRING_DATASOURCE_PASSWORD: release_radar
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set (base64-encoded 32+ byte key)}
      MAIL_HOST: smtp-relay.brevo.com
      MAIL_PORT: 587
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      MAIL_FROM: lambertheo@gmail.com
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: release-radar-frontend
    ports:
      - '3000:80'
    depends_on:
      - app

volumes:
  postgres_data:
