<script>
        // Simple micro-interaction for form feedback
        document.getElementById('registrationForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalHtml = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> Syncing...';
            
            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> Welcome Aboard!';
                btn.classList.replace('gradient-button', 'bg-tertiary-container text-on-tertiary-container');
            }, 1500);
        });

        // Floating particle effect for the background
        function createParticles() {
            const container = document.body;
            for (let i = 0; i < 15; i++) {
                const p = document.createElement('div');
                p.className = 'fixed pointer-events-none rounded-full bg-primary/10 blur-md transition-opacity duration-1000';
                const size = Math.random() * 200 + 50;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.top = Math.random() * 100 + 'vh';
                p.style.opacity = '0';
                container.appendChild(p);

                setTimeout(() => {
                    p.style.opacity = Math.random() * 0.3;
                    animateParticle(p);
                }, Math.random() * 1000);
            }
        }

        function animateParticle(el) {
            const duration = Math.random() * 20000 + 10000;
            const x = (Math.random() - 0.5) * 200;
            const y = (Math.random() - 0.5) * 200;
            
            el.animate([
                { transform: 'translate(0, 0)' },
                { transform: `translate(${x}px, ${y}px)` }
            ], {
                duration: duration,
                iterations: Infinity,
                direction: 'alternate',
                easing: 'ease-in-out'
            });
        }

        createParticles();
    </script>
