spring.application.name=release-radar

# DataSource
spring.datasource.url=jdbc:postgresql://localhost:5432/release_radar
spring.datasource.username=release_radar
spring.datasource.password=release_radar
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.baseline-on-migrate=true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Logs — défaut sûr (WARN). Passer à DEBUG ponctuellement en local si besoin de
# tracer l'authentification ; ne JAMAIS committer DEBUG (fuite de détails de sécurité).
logging.level.org.springframework.security=WARN

# JWT — access token de courte durée (15 min). Le renouvellement se fait via refresh token.
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=900000

# Refresh tokens : durée de validité (jours). Révocables côté serveur (logout).
security.refresh-token.expiration-days=7

# Rate limiting anti-brute-force sur /api/auth/** (par IP client).
# `capacity` requêtes autorisées, rechargées entièrement toutes les `refill-minutes`.
ratelimit.auth.capacity=10
ratelimit.auth.refill-minutes=1

# URL publique du frontend, utilisée pour construire le lien de vérification d'email.
# En prod : injecté par docker-compose (https://${DOMAIN}).
app.base-url=${APP_BASE_URL:http://localhost:5173}

# Mail (override via env vars MAIL_HOST / MAIL_PORT / MAIL_USERNAME / MAIL_PASSWORD)
spring.mail.host=${MAIL_HOST:smtp-relay.brevo.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Verified sender address (must be validated in Brevo dashboard)
mail.from=${MAIL_FROM:lambertheo@gmail.com}
