# =========================================================================
# Profil PRODUCTION — activé via SPRING_PROFILES_ACTIVE=prod
#
# Les secrets (base, JWT, SMTP) DOIVENT venir de variables d'environnement /
# d'un secret manager (AWS Secrets Manager, Azure Key Vault). Rien en dur ici.
# Les propriétés spring.datasource.* / jwt.secret sont fournies par l'env :
#   SPRING_DATASOURCE_URL / SPRING_DATASOURCE_USERNAME / SPRING_DATASOURCE_PASSWORD
#   JWT_SECRET, SMTP_USERNAME, SMTP_PASSWORD, MAIL_FROM
# (liaison relâchée Spring Boot : la variable d'env écrase la propriété.)
# =========================================================================

# Logs : pas de bruit ni de détails de sécurité en prod
logging.level.root=INFO
logging.level.org.springframework.security=WARN
logging.level.dev.theolambert=INFO

# Ne jamais exposer le SQL ni les détails d'erreur internes au client
spring.jpa.show-sql=false
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never

# Derrière un reverse proxy / load balancer qui termine le TLS :
# fait confiance aux en-têtes X-Forwarded-* pour connaître le vrai schéma (https) et l'IP.
server.forward-headers-strategy=framework
