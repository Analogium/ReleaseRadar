# Test profile — datasource is provided by Testcontainers (@ServiceConnection).
# Base64-encoded 32-byte key, valid for HS256 (test only).
jwt.secret=MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
jwt.expiration-ms=3600000

# No real SMTP during tests.
spring.mail.host=localhost
spring.mail.username=
spring.mail.password=

# Chaque combinaison de config (@TestPropertySource/@MockitoBean) crée un contexte Spring
# distinct, donc un pool Hikari distinct, vers le MÊME Postgres Testcontainers. On borne
# chaque pool pour ne pas épuiser les connexions de la base (« too many clients »).
spring.datasource.hikari.maximum-pool-size=3
